name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  runtime:
    name: JS Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/zoya-runtime/package-lock.json
      - run: npm ci
        working-directory: packages/zoya-runtime
      - run: npm run lint
        working-directory: packages/zoya-runtime
      - run: npm test
        working-directory: packages/zoya-runtime
      - run: npm run typecheck
        working-directory: packages/zoya-runtime

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/zoya-dashboard/package-lock.json
      - run: npm ci
        working-directory: packages/zoya-dashboard
      - run: npm run lint
        working-directory: packages/zoya-dashboard
      - run: npm test
        working-directory: packages/zoya-dashboard
      - run: npm run typecheck
        working-directory: packages/zoya-dashboard

  tree-sitter:
    name: Tree-sitter Grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/tree-sitter-zoya/package-lock.json
      - run: npm ci
        working-directory: editors/tree-sitter-zoya
      - run: npx tree-sitter generate
        working-directory: editors/tree-sitter-zoya
      - run: npx tree-sitter test
        working-directory: editors/tree-sitter-zoya
      - run: npm run parse-all
        working-directory: editors/tree-sitter-zoya
